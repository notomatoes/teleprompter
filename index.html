<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>提词器</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f7fb;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --accent: #0a84ff;
        --border: #d1d5db;
        --mask-tint: rgba(246, 247, 251, 0.28);
        --focus-line: rgba(17, 24, 39, 0.2);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b0d12;
          --panel: #131722;
          --text: #f3f4f6;
          --muted: #9ca3af;
          --accent: #4ea2ff;
          --border: #303742;
          --mask-tint: rgba(11, 13, 18, 0.32);
          --focus-line: rgba(243, 244, 246, 0.28);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, var(--bg), #e9edf8 40%, var(--bg));
        min-height: 100vh;
      }

      .app {
        max-width: none;
        margin: 0 auto;
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        backdrop-filter: blur(6px);
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 12px;
        align-items: end;
      }

      .control {
        display: grid;
        gap: 8px;
      }

      label {
        font-size: 14px;
        color: var(--muted);
      }

      input[type="range"] {
        width: 100%;
      }

      input[type="number"],
      select {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        padding: 10px 12px;
        font: inherit;
      }

      .value {
        font-size: 13px;
        color: var(--muted);
      }

      .buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }

      .secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }

      textarea {
        width: 100%;
        min-height: 180px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        padding: 12px;
        font: inherit;
        resize: vertical;
      }

      .teleprompter {
        --side-padding: 110px;
        --focus-height: 216px;
        height: calc(100dvh - 170px);
        position: relative;
        overflow-y: auto;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
        padding: 0;
      }

      .teleprompter-text {
        position: relative;
        z-index: 1;
        white-space: pre-wrap;
        line-height: 1.5;
        font-weight: 600;
        font-size: 72px;
        letter-spacing: 0.02em;
        padding: 24px var(--side-padding) 28px;
      }

      .focus-mask {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
      }

      .focus-blur {
        position: absolute;
        left: 0;
        right: 0;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }

      .focus-top {
        top: 0;
        height: calc((100% - var(--focus-height)) / 2);
        background: linear-gradient(180deg, var(--mask-tint), rgba(0, 0, 0, 0));
      }

      .focus-bottom {
        bottom: 0;
        height: calc((100% - var(--focus-height)) / 2);
        background: linear-gradient(0deg, var(--mask-tint), rgba(0, 0, 0, 0));
      }

      .focus-window {
        position: absolute;
        left: 0;
        right: 0;
        top: calc((100% - var(--focus-height)) / 2);
        height: var(--focus-height);
        border-top: 1px solid var(--focus-line);
        border-bottom: 1px solid var(--focus-line);
      }

      .hint {
        margin: 6px 0 0;
        font-size: 13px;
        color: var(--muted);
      }

      #editorPanel {
        display: none;
      }

      body.show-editor #editorPanel {
        display: block;
      }

      body.show-editor .teleprompter {
        height: calc(100dvh - 390px);
      }

      #teleprompterPanel:fullscreen {
        border-radius: 0;
        border: 0;
        padding: 0;
      }

      #teleprompterPanel:fullscreen .teleprompter {
        height: 100dvh;
        border-radius: 0;
        border: 0;
        padding: 28px;
      }

      @media (max-width: 860px) {
        .controls {
          grid-template-columns: 1fr 1fr 1fr;
        }

        .teleprompter {
          height: calc(100dvh - 220px);
        }

        .teleprompter-text {
          font-size: 56px;
        }

        body.show-editor .teleprompter {
          height: calc(100dvh - 420px);
        }
      }

      @media (max-width: 520px) {
        .controls {
          grid-template-columns: 1fr;
        }

        .teleprompter-text {
          font-size: 48px;
        }

        .teleprompter {
          height: calc(100dvh - 280px);
        }

        body.show-editor .teleprompter {
          height: calc(100dvh - 500px);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="controls">
          <div class="control">
            <label for="speed">滚动速度</label>
            <input id="speed" type="range" min="10" max="300" step="5" value="60" />
            <div id="speedValue" class="value">60 px/s</div>
          </div>
          <div class="control">
            <label for="fontSize">字体大小</label>
            <input id="fontSize" type="range" min="44" max="160" step="2" value="72" />
            <div id="fontSizeValue" class="value">72 px</div>
          </div>
          <div class="control">
            <label for="speedMode">速度模式</label>
            <select id="speedMode">
              <option value="manual">手动速度</option>
              <option value="duration">按总时长</option>
            </select>
            <div id="modeHint" class="value">当前按手动速度滚动</div>
          </div>
          <div class="control">
            <label for="totalDuration">总时长（秒）</label>
            <input id="totalDuration" type="number" min="10" max="7200" step="10" value="120" />
            <div id="durationValue" class="value">120 秒（2分00秒）</div>
          </div>
          <div class="control">
            <label for="sidePadding">两侧留白</label>
            <input id="sidePadding" type="range" min="0" max="320" step="4" value="110" />
            <div id="sidePaddingValue" class="value">110 px</div>
          </div>
          <div class="control" style="grid-column: span 2;">
            <div class="buttons">
              <button id="start" class="primary">开始</button>
              <button id="pause" class="secondary">暂停</button>
              <button id="reset" class="secondary">回到顶部</button>
              <button id="toggleEditor" class="secondary">显示编辑区</button>
              <button id="fullscreen" class="secondary">全屏提词</button>
            </div>
          </div>
        </div>
      </section>

      <section id="editorPanel" class="panel">
        <label for="sourceText">提词内容</label>
        <textarea id="sourceText" placeholder="把你的台词粘贴到这里...">欢迎使用网页版提词器。

默认已经放大字体，适合中远距离阅读。
你可以在上方拖动速度，自动向下滚动。</textarea>
        <p class="hint">输入内容会实时同步到下方提词区。</p>
      </section>

      <section id="teleprompterPanel" class="panel">
        <div id="teleprompter" class="teleprompter">
          <div id="teleprompterText" class="teleprompter-text"></div>
          <div class="focus-mask" aria-hidden="true">
            <div class="focus-blur focus-top"></div>
            <div class="focus-window"></div>
            <div class="focus-blur focus-bottom"></div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const sourceText = document.getElementById("sourceText");
      const teleprompter = document.getElementById("teleprompter");
      const teleprompterText = document.getElementById("teleprompterText");

      const speed = document.getElementById("speed");
      const speedValue = document.getElementById("speedValue");
      const fontSize = document.getElementById("fontSize");
      const fontSizeValue = document.getElementById("fontSizeValue");
      const speedMode = document.getElementById("speedMode");
      const modeHint = document.getElementById("modeHint");
      const totalDuration = document.getElementById("totalDuration");
      const durationValue = document.getElementById("durationValue");
      const sidePadding = document.getElementById("sidePadding");
      const sidePaddingValue = document.getElementById("sidePaddingValue");

      const startButton = document.getElementById("start");
      const pauseButton = document.getElementById("pause");
      const resetButton = document.getElementById("reset");
      const toggleEditorButton = document.getElementById("toggleEditor");
      const fullscreenButton = document.getElementById("fullscreen");
      const teleprompterPanel = document.getElementById("teleprompterPanel");

      let running = false;
      let lastFrameTime = 0;
      let durationModeSpeed = 0;

      function syncText() {
        teleprompterText.textContent = sourceText.value || "";
      }

      function updateSpeedLabel() {
        speedValue.textContent = `${speed.value} px/s`;
      }

      function updateFontLabel() {
        const px = `${fontSize.value}px`;
        teleprompterText.style.fontSize = px;
        fontSizeValue.textContent = px;
        const focusHeight = Math.round(Number(fontSize.value) * 1.5 * 2);
        teleprompter.style.setProperty("--focus-height", `${focusHeight}px`);
      }

      function updateSidePaddingLabel() {
        const value = Number(sidePadding.value);
        teleprompter.style.setProperty("--side-padding", `${value}px`);
        sidePaddingValue.textContent = `${value} px`;
      }

      function formatDuration(seconds) {
        const safeSeconds = Math.max(1, Math.floor(seconds));
        const minutes = Math.floor(safeSeconds / 60);
        const remainSeconds = safeSeconds % 60;
        return `${minutes}分${String(remainSeconds).padStart(2, "0")}秒`;
      }

      function getRemainingDistance() {
        const remaining = teleprompter.scrollHeight - teleprompter.clientHeight - teleprompter.scrollTop;
        return Math.max(0, remaining);
      }

      function getSafeDurationSeconds() {
        const parsed = Number(totalDuration.value);
        if (!Number.isFinite(parsed)) {
          totalDuration.value = "120";
          return 120;
        }

        const clamped = Math.min(7200, Math.max(10, Math.round(parsed)));
        if (String(clamped) !== totalDuration.value) {
          totalDuration.value = String(clamped);
        }
        return clamped;
      }

      function updateDurationLabel() {
        const seconds = getSafeDurationSeconds();
        durationValue.textContent = `${seconds} 秒（${formatDuration(seconds)}）`;
      }

      function updateModeHint() {
        if (speedMode.value === "manual") {
          modeHint.textContent = "当前按手动速度滚动";
          return;
        }

        const seconds = getSafeDurationSeconds();
        const remaining = getRemainingDistance();
        const computed = seconds > 0 ? remaining / seconds : 0;
        modeHint.textContent = `按当前剩余内容约 ${computed.toFixed(1)} px/s`;
      }

      function animate(time) {
        if (!running) {
          return;
        }

        if (!lastFrameTime) {
          lastFrameTime = time;
        }

        const deltaSeconds = (time - lastFrameTime) / 1000;
        lastFrameTime = time;

        const frameSpeed = speedMode.value === "duration" ? durationModeSpeed : Number(speed.value);
        teleprompter.scrollTop += frameSpeed * deltaSeconds;

        const maxTop = teleprompter.scrollHeight - teleprompter.clientHeight;
        if (teleprompter.scrollTop >= maxTop) {
          running = false;
          lastFrameTime = 0;
          return;
        }

        requestAnimationFrame(animate);
      }

      startButton.addEventListener("click", () => {
        if (running) {
          return;
        }

        if (speedMode.value === "duration") {
          const remaining = getRemainingDistance();
          const seconds = getSafeDurationSeconds();
          durationModeSpeed = seconds > 0 ? remaining / seconds : 0;
        }

        running = true;
        requestAnimationFrame(animate);
      });

      pauseButton.addEventListener("click", () => {
        running = false;
        lastFrameTime = 0;
      });

      resetButton.addEventListener("click", () => {
        teleprompter.scrollTop = 0;
        running = false;
        lastFrameTime = 0;
        updateModeHint();
      });

      toggleEditorButton.addEventListener("click", () => {
        document.body.classList.toggle("show-editor");
        const visible = document.body.classList.contains("show-editor");
        toggleEditorButton.textContent = visible ? "隐藏编辑区" : "显示编辑区";
        updateModeHint();
      });

      fullscreenButton.addEventListener("click", async () => {
        try {
          if (document.fullscreenElement) {
            await document.exitFullscreen();
            return;
          }
          await teleprompterPanel.requestFullscreen();
        } catch (error) {
          console.error("切换全屏失败:", error);
        }
      });

      sourceText.addEventListener("input", () => {
        syncText();
        updateModeHint();
      });
      speed.addEventListener("input", updateSpeedLabel);
      fontSize.addEventListener("input", updateFontLabel);
      sidePadding.addEventListener("input", updateSidePaddingLabel);
      speedMode.addEventListener("change", () => {
        if (running && speedMode.value === "duration") {
          const remaining = getRemainingDistance();
          const seconds = getSafeDurationSeconds();
          durationModeSpeed = seconds > 0 ? remaining / seconds : 0;
        }
        updateModeHint();
      });
      totalDuration.addEventListener("input", () => {
        updateDurationLabel();
        updateModeHint();
      });
      teleprompter.addEventListener("scroll", updateModeHint);
      document.addEventListener("fullscreenchange", updateModeHint);
      window.addEventListener("resize", updateModeHint);

      syncText();
      updateSpeedLabel();
      updateFontLabel();
      updateSidePaddingLabel();
      updateDurationLabel();
      updateModeHint();
    </script>
  </body>
</html>
