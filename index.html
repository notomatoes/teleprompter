<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>提词器</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f7fb;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --accent: #0a84ff;
        --border: #d1d5db;
        --focus-text: #d92c20;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b0d12;
          --panel: #131722;
          --text: #f3f4f6;
          --muted: #9ca3af;
          --accent: #4ea2ff;
          --border: #303742;
          --focus-text: #ff6b61;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, var(--bg), #e9edf8 40%, var(--bg));
        min-height: 100vh;
      }

      .app {
        max-width: none;
        margin: 0 auto;
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        backdrop-filter: blur(6px);
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        align-items: end;
      }

      .control {
        display: grid;
        gap: 8px;
      }

      label {
        font-size: 14px;
        color: var(--muted);
      }

      input[type="range"] {
        width: 100%;
      }

      input[type="number"],
      select {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        padding: 10px 12px;
        font: inherit;
      }

      input[type="color"] {
        width: 100%;
        height: 42px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        padding: 4px;
      }

      .value {
        font-size: 13px;
        color: var(--muted);
      }

      .buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }

      .secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }

      textarea {
        width: 100%;
        min-height: 180px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        padding: 12px;
        font: inherit;
        resize: vertical;
      }

      .teleprompter {
        height: 100%;
        overflow-y: auto;
        padding: 0;
      }

      .teleprompter-frame {
        --side-padding: 110px;
        --top-spacing: 500px;
        --bottom-spacing: 500px;
        height: calc(100dvh - 170px);
        position: relative;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
        overflow: hidden;
      }

      .teleprompter-text {
        white-space: pre-wrap;
        line-height: 1.5;
        font-weight: 600;
        font-size: 72px;
        letter-spacing: 0.02em;
        padding: var(--top-spacing) var(--side-padding) var(--bottom-spacing);
      }

      .teleprompter-line {
        white-space: pre;
      }

      .teleprompter-line.is-highlighted-l1 {
        color: var(--focus-text-1, var(--focus-text));
        font-weight: 700;
      }

      .teleprompter-line.is-highlighted-l2 {
        color: var(--focus-text-2, var(--focus-text));
        font-weight: 700;
      }

      .teleprompter-line.is-highlighted-l3 {
        color: var(--focus-text-3, var(--focus-text));
        font-weight: 700;
      }

      .hint {
        margin: 6px 0 0;
        font-size: 13px;
        color: var(--muted);
      }

      #editorPanel {
        display: none;
      }

      body.show-editor #editorPanel {
        display: block;
      }

      body.show-editor .teleprompter {
        height: 100%;
      }

      body.show-editor .teleprompter-frame {
        height: calc(100dvh - 390px);
      }

      #teleprompterPanel:fullscreen {
        border-radius: 0;
        border: 0;
        padding: 0;
      }

      #teleprompterPanel:fullscreen .teleprompter {
        height: 100%;
        border-radius: 0;
        border: 0;
      }

      #teleprompterPanel:fullscreen .teleprompter-frame {
        height: 100dvh;
        border-radius: 0;
        border: 0;
      }

      @media (max-width: 860px) {
        .controls {
          grid-template-columns: 1fr 1fr;
        }

        .teleprompter {
          height: 100%;
        }

        .teleprompter-frame {
          height: calc(100dvh - 220px);
        }

        .teleprompter-text {
          font-size: 56px;
        }

        body.show-editor .teleprompter {
          height: 100%;
        }

        body.show-editor .teleprompter-frame {
          height: calc(100dvh - 420px);
        }
      }

      @media (max-width: 520px) {
        .controls {
          grid-template-columns: 1fr;
        }

        .teleprompter-text {
          font-size: 48px;
        }

        .teleprompter {
          height: 100%;
        }

        .teleprompter-frame {
          height: calc(100dvh - 280px);
        }

        body.show-editor .teleprompter {
          height: 100%;
        }

        body.show-editor .teleprompter-frame {
          height: calc(100dvh - 500px);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="controls">
          <div class="control">
            <label for="speed">滚动速度</label>
            <input id="speed" type="range" min="10" max="300" step="5" value="60" />
            <div id="speedValue" class="value">60 px/s</div>
          </div>
          <div class="control">
            <label for="fontSize">字体大小</label>
            <input id="fontSize" type="range" min="44" max="160" step="2" value="72" />
            <div id="fontSizeValue" class="value">72 px</div>
          </div>
          <div class="control">
            <label for="speedMode">速度模式</label>
            <select id="speedMode">
              <option value="manual">手动速度</option>
              <option value="duration">按总时长</option>
            </select>
            <div id="modeHint" class="value">当前按手动速度滚动</div>
          </div>
          <div class="control">
            <label for="totalDuration">总时长（秒）</label>
            <input id="totalDuration" type="number" min="10" max="7200" step="10" value="120" />
            <div id="durationValue" class="value">120 秒（2分00秒）</div>
          </div>
          <div class="control">
            <label for="sidePadding">两侧留白</label>
            <input id="sidePadding" type="range" min="0" max="320" step="4" value="110" />
            <div id="sidePaddingValue" class="value">110 px</div>
          </div>
          <div class="control">
            <label for="topSpacing">上留白</label>
            <input id="topSpacing" type="range" min="0" max="1200" step="10" value="500" />
            <div id="topSpacingValue" class="value">500 px</div>
          </div>
          <div class="control">
            <label for="bottomSpacing">下留白</label>
            <input id="bottomSpacing" type="range" min="0" max="1200" step="10" value="500" />
            <div id="bottomSpacingValue" class="value">500 px</div>
          </div>
          <div class="control">
            <label for="highlightMode">高亮</label>
            <select id="highlightMode">
              <option value="on">开启</option>
              <option value="off">关闭</option>
            </select>
            <div id="highlightModeValue" class="value">中间 3 行已高亮</div>
          </div>
          <div class="control">
            <label for="highlightLines">高亮行数</label>
            <select id="highlightLines">
              <option value="3">3 行</option>
              <option value="2">2 行</option>
              <option value="1">1 行</option>
            </select>
            <div id="highlightLinesValue" class="value">3 行</div>
          </div>
          <div class="control">
            <label for="highlightColor">高亮颜色</label>
            <input id="highlightColor" type="color" value="#d92c20" />
            <div id="highlightColorValue" class="value">#d92c20</div>
          </div>
          <div class="control" style="grid-column: span 2;">
            <div class="buttons">
              <button id="start" class="primary">开始</button>
              <button id="pause" class="secondary">暂停</button>
              <button id="reset" class="secondary">回到顶部</button>
              <button id="toggleEditor" class="secondary">显示编辑区</button>
              <button id="fullscreen" class="secondary">全屏提词</button>
            </div>
          </div>
        </div>
      </section>

      <section id="editorPanel" class="panel">
        <label for="sourceText">提词内容</label>
        <textarea id="sourceText" placeholder="把你的台词粘贴到这里...">YFF 禁止去我家
YFF 禁止去我家
YFF 禁止去我家
YFF 禁止去我家
YFF 禁止去我家</textarea>
        <p class="hint">输入内容会实时同步到下方提词区。</p>
      </section>

      <section id="teleprompterPanel" class="panel">
        <div id="teleprompterFrame" class="teleprompter-frame">
          <div id="teleprompter" class="teleprompter">
            <div id="teleprompterText" class="teleprompter-text"></div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const sourceText = document.getElementById("sourceText");
      const teleprompterFrame = document.getElementById("teleprompterFrame");
      const teleprompter = document.getElementById("teleprompter");
      const teleprompterText = document.getElementById("teleprompterText");

      const speed = document.getElementById("speed");
      const speedValue = document.getElementById("speedValue");
      const fontSize = document.getElementById("fontSize");
      const fontSizeValue = document.getElementById("fontSizeValue");
      const speedMode = document.getElementById("speedMode");
      const modeHint = document.getElementById("modeHint");
      const totalDuration = document.getElementById("totalDuration");
      const durationValue = document.getElementById("durationValue");
      const sidePadding = document.getElementById("sidePadding");
      const sidePaddingValue = document.getElementById("sidePaddingValue");
      const topSpacing = document.getElementById("topSpacing");
      const topSpacingValue = document.getElementById("topSpacingValue");
      const bottomSpacing = document.getElementById("bottomSpacing");
      const bottomSpacingValue = document.getElementById("bottomSpacingValue");
      const highlightMode = document.getElementById("highlightMode");
      const highlightModeValue = document.getElementById("highlightModeValue");
      const highlightLines = document.getElementById("highlightLines");
      const highlightLinesValue = document.getElementById("highlightLinesValue");
      const highlightColor = document.getElementById("highlightColor");
      const highlightColorValue = document.getElementById("highlightColorValue");

      const startButton = document.getElementById("start");
      const pauseButton = document.getElementById("pause");
      const resetButton = document.getElementById("reset");
      const toggleEditorButton = document.getElementById("toggleEditor");
      const fullscreenButton = document.getElementById("fullscreen");
      const teleprompterPanel = document.getElementById("teleprompterPanel");

      const LINE_HEIGHT_MULTIPLIER = 1.5;
      const LETTER_SPACING_RATIO = 0.02;
      const measureContext = document.createElement("canvas").getContext("2d");
      const fontFamily =
        '-apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif';

      let running = false;
      let lastFrameTime = 0;
      let durationRemainingSeconds = 0;
      let pendingFullscreenAutoStart = false;
      let pendingViewportAnchor = null;
      let lineElements = [];
      let highlightedLineIndexes = [];

      function updateSpeedLabel() {
        speedValue.textContent = `${speed.value} px/s`;
      }

      function measureLineWidth(text, letterSpacingPx) {
        if (!text) {
          return 0;
        }
        return measureContext.measureText(text).width + Math.max(0, text.length - 1) * letterSpacingPx;
      }

      function wrapParagraphByWidth(paragraph, maxWidth, letterSpacingPx) {
        if (!paragraph) {
          return [""];
        }

        const chars = Array.from(paragraph);
        const lines = [];
        let current = "";

        for (const char of chars) {
          const candidate = current + char;
          const candidateWidth = measureLineWidth(candidate, letterSpacingPx);
          if (!current || candidateWidth <= maxWidth) {
            current = candidate;
            continue;
          }

          lines.push(current);
          current = char;
        }

        if (current) {
          lines.push(current);
        }

        return lines;
      }

      function buildWrappedLines(text, maxWidth, letterSpacingPx) {
        const paragraphs = text.split("\n");
        const wrappedLines = [];

        for (const paragraph of paragraphs) {
          wrappedLines.push(...wrapParagraphByWidth(paragraph, maxWidth, letterSpacingPx));
        }

        return wrappedLines.length > 0 ? wrappedLines : [""];
      }

      function updateHighlightedLine() {
        for (const index of highlightedLineIndexes) {
          if (lineElements[index]) {
            lineElements[index].classList.remove(
              "is-highlighted-l1",
              "is-highlighted-l2",
              "is-highlighted-l3"
            );
          }
        }
        highlightedLineIndexes = [];

        if (highlightMode.value !== "on" || lineElements.length === 0) {
          return;
        }

        const requestedLines = Number.parseInt(highlightLines.value, 10);
        const lineCount = Math.min(3, Math.max(1, Number.isFinite(requestedLines) ? requestedLines : 1));
        const lineHeight = Number(fontSize.value) * LINE_HEIGHT_MULTIPLIER;
        const topPad = Number(topSpacing.value);
        const currentY = teleprompter.scrollTop + teleprompter.clientHeight / 2 - topPad;
        const targetIndex = Math.floor(currentY / lineHeight);
        const clampedCenter = Math.max(0, Math.min(lineElements.length - 1, targetIndex));
        let startIndex = clampedCenter - Math.floor((lineCount - 1) / 2);
        if (startIndex < 0) {
          startIndex = 0;
        }
        if (startIndex + lineCount > lineElements.length) {
          startIndex = Math.max(0, lineElements.length - lineCount);
        }

        for (let i = 0; i < lineCount; i += 1) {
          const index = startIndex + i;
          if (!lineElements[index]) {
            continue;
          }
          const className = i === 0 ? "is-highlighted-l1" : i === 1 ? "is-highlighted-l2" : "is-highlighted-l3";
          lineElements[index].classList.add(className);
          highlightedLineIndexes.push(index);
        }
      }

      function renderTeleprompterText() {
        const text = sourceText.value || "";
        const fontPx = Number(fontSize.value);
        const sidePad = Number(sidePadding.value);
        const letterSpacingPx = fontPx * LETTER_SPACING_RATIO;
        const maxWidth = Math.max(40, teleprompter.clientWidth - sidePad * 2);

        measureContext.font = `600 ${fontPx}px ${fontFamily}`;
        const lines = buildWrappedLines(text, maxWidth, letterSpacingPx);

        const fragment = document.createDocumentFragment();
        for (const line of lines) {
          const lineDiv = document.createElement("div");
          lineDiv.className = "teleprompter-line";
          lineDiv.textContent = line.length > 0 ? line : " ";
          fragment.appendChild(lineDiv);
        }

        teleprompterText.replaceChildren(fragment);
        lineElements = Array.from(teleprompterText.children);
        updateHighlightedLine();
      }

      function updateFontLabel() {
        const px = `${fontSize.value}px`;
        teleprompterText.style.fontSize = px;
        fontSizeValue.textContent = px;
        renderTeleprompterText();
      }

      function updateSidePaddingLabel() {
        const value = Number(sidePadding.value);
        teleprompterFrame.style.setProperty("--side-padding", `${value}px`);
        sidePaddingValue.textContent = `${value} px`;
        renderTeleprompterText();
      }

      function updateVerticalSpacing() {
        const topValue = Number(topSpacing.value);
        const bottomValue = Number(bottomSpacing.value);
        teleprompterFrame.style.setProperty("--top-spacing", `${topValue}px`);
        teleprompterFrame.style.setProperty("--bottom-spacing", `${bottomValue}px`);
        topSpacingValue.textContent = `${topValue} px`;
        bottomSpacingValue.textContent = `${bottomValue} px`;
        updateHighlightedLine();
      }

      function hexToRgb(hex) {
        const raw = hex.replace("#", "");
        if (raw.length !== 6) {
          return null;
        }
        const r = Number.parseInt(raw.slice(0, 2), 16);
        const g = Number.parseInt(raw.slice(2, 4), 16);
        const b = Number.parseInt(raw.slice(4, 6), 16);
        if (![r, g, b].every((value) => Number.isFinite(value))) {
          return null;
        }
        return { r, g, b };
      }

      function rgbToHex(r, g, b) {
        const toHex = (value) => Math.round(Math.max(0, Math.min(255, value))).toString(16).padStart(2, "0");
        return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
      }

      function mixWithWhite(hex, ratio) {
        const rgb = hexToRgb(hex);
        if (!rgb) {
          return hex;
        }
        const t = Math.max(0, Math.min(1, ratio));
        return rgbToHex(
          rgb.r + (255 - rgb.r) * t,
          rgb.g + (255 - rgb.g) * t,
          rgb.b + (255 - rgb.b) * t
        );
      }

      function updateHighlightConfig() {
        const enabled = highlightMode.value === "on";
        const requestedLines = Number.parseInt(highlightLines.value, 10);
        const lineCount = Math.min(3, Math.max(1, Number.isFinite(requestedLines) ? requestedLines : 1));
        highlightLinesValue.textContent = `${lineCount} 行`;
        highlightModeValue.textContent = enabled ? `中间 ${lineCount} 行已高亮` : "高亮已关闭";

        const color = highlightColor.value.toLowerCase();
        highlightColorValue.textContent = color;
        teleprompterFrame.style.setProperty("--focus-text", color);
        teleprompterFrame.style.setProperty("--focus-text-1", color);
        teleprompterFrame.style.setProperty("--focus-text-2", mixWithWhite(color, 0.35));
        teleprompterFrame.style.setProperty("--focus-text-3", mixWithWhite(color, 0.6));
        updateHighlightedLine();
      }

      function getViewportAnchor() {
        return teleprompter.scrollTop + teleprompter.clientHeight / 2;
      }

      function restoreViewportAnchor(anchor) {
        if (anchor === null) {
          return;
        }

        const maxTop = Math.max(0, teleprompter.scrollHeight - teleprompter.clientHeight);
        const targetTop = Math.max(0, Math.min(anchor - teleprompter.clientHeight / 2, maxTop));
        teleprompter.scrollTop = targetTop;
      }

      function formatDuration(seconds) {
        const safeSeconds = Math.max(1, Math.floor(seconds));
        const minutes = Math.floor(safeSeconds / 60);
        const remainSeconds = safeSeconds % 60;
        return `${minutes}分${String(remainSeconds).padStart(2, "0")}秒`;
      }

      function getRemainingDistance() {
        const remaining = teleprompter.scrollHeight - teleprompter.clientHeight - teleprompter.scrollTop;
        return Math.max(0, remaining);
      }

      function getSafeDurationSeconds() {
        const parsed = Number(totalDuration.value);
        if (!Number.isFinite(parsed)) {
          totalDuration.value = "120";
          return 120;
        }

        const clamped = Math.min(7200, Math.max(10, Math.round(parsed)));
        if (String(clamped) !== totalDuration.value) {
          totalDuration.value = String(clamped);
        }
        return clamped;
      }

      function updateDurationLabel() {
        const seconds = getSafeDurationSeconds();
        durationValue.textContent = `${seconds} 秒（${formatDuration(seconds)}）`;
      }

      function updateModeHint() {
        if (speedMode.value === "manual") {
          modeHint.textContent = "当前按手动速度滚动";
          return;
        }

        const remaining = getRemainingDistance();
        const shouldUseRemainingSeconds = durationRemainingSeconds > 0 && teleprompter.scrollTop > 1;
        const seconds = shouldUseRemainingSeconds
          ? Math.max(durationRemainingSeconds, 0)
          : getSafeDurationSeconds();
        const computed = seconds > 0 ? remaining / seconds : 0;
        if (remaining <= 0) {
          modeHint.textContent = "当前内容不足以滚动";
          return;
        }
        modeHint.textContent = `剩余约 ${formatDuration(seconds)}，当前 ${computed.toFixed(1)} px/s`;
      }

      function animate(time) {
        if (!running) {
          return;
        }

        if (!lastFrameTime) {
          lastFrameTime = time;
        }

        const deltaSeconds = (time - lastFrameTime) / 1000;
        lastFrameTime = time;

        let frameSpeed = Number(speed.value);
        if (speedMode.value === "duration") {
          const remaining = getRemainingDistance();
          const safeSeconds = Math.max(durationRemainingSeconds, 0.016);
          frameSpeed = remaining / safeSeconds;
          durationRemainingSeconds = Math.max(0, durationRemainingSeconds - deltaSeconds);
        }
        teleprompter.scrollTop += frameSpeed * deltaSeconds;
        updateHighlightedLine();

        const maxTop = teleprompter.scrollHeight - teleprompter.clientHeight;
        if (teleprompter.scrollTop >= maxTop) {
          running = false;
          lastFrameTime = 0;
          durationRemainingSeconds = 0;
          updateModeHint();
          return;
        }

        requestAnimationFrame(animate);
      }

      function startScrolling() {
        if (running) {
          return false;
        }

        if (speedMode.value === "duration") {
          if (getRemainingDistance() <= 0) {
            updateModeHint();
            return false;
          }
          if (durationRemainingSeconds <= 0 || teleprompter.scrollTop <= 1) {
            durationRemainingSeconds = getSafeDurationSeconds();
          }
        } else {
          durationRemainingSeconds = 0;
        }

        running = true;
        requestAnimationFrame(animate);
        return true;
      }

      startButton.addEventListener("click", () => {
        startScrolling();
      });

      pauseButton.addEventListener("click", () => {
        running = false;
        lastFrameTime = 0;
      });

      resetButton.addEventListener("click", () => {
        teleprompter.scrollTop = 0;
        running = false;
        lastFrameTime = 0;
        durationRemainingSeconds = 0;
        updateHighlightedLine();
        updateModeHint();
      });

      toggleEditorButton.addEventListener("click", () => {
        document.body.classList.toggle("show-editor");
        const visible = document.body.classList.contains("show-editor");
        toggleEditorButton.textContent = visible ? "隐藏编辑区" : "显示编辑区";
        const anchor = getViewportAnchor();
        renderTeleprompterText();
        restoreViewportAnchor(anchor);
        updateHighlightedLine();
        updateModeHint();
      });

      fullscreenButton.addEventListener("click", async () => {
        try {
          pendingViewportAnchor = getViewportAnchor();
          if (document.fullscreenElement) {
            pendingFullscreenAutoStart = false;
            await document.exitFullscreen();
            return;
          }
          pendingFullscreenAutoStart = true;
          await teleprompterPanel.requestFullscreen();
        } catch (error) {
          pendingFullscreenAutoStart = false;
          console.error("切换全屏失败:", error);
        }
      });

      sourceText.addEventListener("input", () => {
        const anchor = getViewportAnchor();
        renderTeleprompterText();
        restoreViewportAnchor(anchor);
        updateModeHint();
      });
      speed.addEventListener("input", updateSpeedLabel);
      fontSize.addEventListener("input", () => {
        const anchor = getViewportAnchor();
        updateFontLabel();
        restoreViewportAnchor(anchor);
        updateModeHint();
      });
      sidePadding.addEventListener("input", () => {
        const anchor = getViewportAnchor();
        updateSidePaddingLabel();
        restoreViewportAnchor(anchor);
        updateModeHint();
      });
      topSpacing.addEventListener("input", () => {
        updateVerticalSpacing();
        updateModeHint();
      });
      bottomSpacing.addEventListener("input", () => {
        updateVerticalSpacing();
        updateModeHint();
      });
      speedMode.addEventListener("change", () => {
        if (speedMode.value === "duration") {
          durationRemainingSeconds = getSafeDurationSeconds();
        } else {
          durationRemainingSeconds = 0;
        }
        updateModeHint();
      });
      totalDuration.addEventListener("input", () => {
        updateDurationLabel();
        if (speedMode.value === "duration") {
          durationRemainingSeconds = getSafeDurationSeconds();
        }
        updateModeHint();
      });
      highlightMode.addEventListener("change", updateHighlightConfig);
      highlightLines.addEventListener("change", updateHighlightConfig);
      highlightColor.addEventListener("input", updateHighlightConfig);
      teleprompter.addEventListener("scroll", () => {
        updateHighlightedLine();
        updateModeHint();
      });
      document.addEventListener("fullscreenchange", () => {
        requestAnimationFrame(() => {
          restoreViewportAnchor(pendingViewportAnchor);
          pendingViewportAnchor = null;
          updateHighlightedLine();
          updateModeHint();

          if (pendingFullscreenAutoStart && document.fullscreenElement === teleprompterPanel) {
            startScrolling();
          }
          if (document.fullscreenElement !== teleprompterPanel) {
            pendingFullscreenAutoStart = false;
          }
        });
      });
      window.addEventListener("resize", () => {
        const anchor = getViewportAnchor();
        renderTeleprompterText();
        restoreViewportAnchor(anchor);
        updateHighlightedLine();
        updateModeHint();
      });

      updateSpeedLabel();
      updateFontLabel();
      updateSidePaddingLabel();
      updateVerticalSpacing();
      updateDurationLabel();
      updateHighlightConfig();
      updateModeHint();
    </script>
  </body>
</html>
